services:
  app:
    platform: linux/amd64
    image: softformarket-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-80}:8000"
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  worker:
    platform: linux/amd64
    image: softformarket-app
    depends_on:
      - app
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
